<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 CropCare AI</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<header>
    <h1 id="title">🌱 CropCare AI</h1>
    <p id="subtitle">Smart Crop Disease Detection</p>
</header>

<!-- LANGUAGE -->
<div class="lang-selector">
    <label id="langLabel">🌍 Language:</label>
    <select id="languageSelect">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="bn">Bengali</option>
        <option value="kn">Kannada</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="or">Odia</option>
    </select>
</div>

<!-- INPUT -->
<div class="card">

    <input type="file" id="fileInput" accept="image/*">

    <label id="cropLabel">Select Crop:</label>
    <select id="cropType">
        <option value="auto">Auto Detect</option>
        <option value="tomato">Tomato</option>
        <option value="potato">Potato</option>
        <option value="rice">Rice</option>
        <option value="wheat">Wheat</option>
        <option value="jute">Jute</option>
        <option value="barley">Barley</option>
        <option value="millet">Millet</option>
        <option value="brinjal">Brinjal</option>
        <option value="cauliflower">Cauliflower</option>
    </select>

    <button id="analyzeBtn">Analyze</button>

</div>

<!-- RESULT -->
<div class="card" id="resultCard" hidden>

    <img id="previewImage" hidden>

    <h2 id="diseaseName"></h2>
    <p id="confidence"></p>

    <h3 id="symptomTitle">Symptoms</h3>
    <ul id="symptoms"></ul>

    <h3 id="treatmentTitle">Treatment</h3>
    <ul id="treatments"></ul>

</div>

</div>

<!-- 🌟 WATERMARK -->
<div class="watermark">Developed by Sampoorna Ghosh 🌱</div>

<script src="js/app.js"></script>

</body>
</html>
